name: Deploy to Render

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'ignore/**'
      - 'LICENSE'
      - '.github/**'
      - '.git/**'
      - 'install.py'
      - 'README_HF.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -f ${{ secrets.RENDER_KEY }}
